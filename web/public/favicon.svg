<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <circle cx="16" cy="16" r="16" fill="#0a0f1a"/>
  <!-- Benzene ring (hexagon) -->
  <polygon points="16,5 23.1,9.5 23.1,18.5 16,23 8.9,18.5 8.9,9.5"
    fill="none" stroke="#10b981" stroke-width="1.8"/>
  <!-- Inner circle (aromatic) -->
  <circle cx="16" cy="14" r="4.2" fill="none" stroke="#10b981" stroke-width="1.2" opacity="0.6"/>
  <!-- Atom nodes -->
  <circle cx="16" cy="5" r="2" fill="#10b981"/>
  <circle cx="23.1" cy="9.5" r="2" fill="#10b981"/>
  <circle cx="23.1" cy="18.5" r="2" fill="#10b981"/>
  <circle cx="16" cy="23" r="2" fill="#10b981"/>
  <circle cx="8.9" cy="18.5" r="2" fill="#10b981"/>
  <circle cx="8.9" cy="9.5" r="2" fill="#10b981"/>
  <!-- Side chains (substituents) -->
  <line x1="16" y1="23" x2="16" y2="28" stroke="#10b981" stroke-width="1.2"/>
  <circle cx="16" cy="28.5" r="1.3" fill="#3b82f6"/>
  <line x1="23.1" y1="9.5" x2="27" y2="7" stroke="#10b981" stroke-width="1.2"/>
  <circle cx="27.5" cy="6.5" r="1.3" fill="#ef4444"/>
</svg>
